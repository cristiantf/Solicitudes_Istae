<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consulta de Trámites · ISTAE</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .consulta-container { max-width: 600px; margin: 40px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .consulta-container h2 { color: var(--verde-osc); margin-top: 0; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; font-size: 0.9rem; font-weight: bold; color: var(--tinta); }
    .form-group input { width: 100%; padding: 12px; border: 1.5px solid var(--linea); border-radius: 8px; font-size: 1rem; box-sizing: border-box; }
    .form-group input:focus { outline: none; border-color: var(--verde); box-shadow: 0 0 0 3px rgba(45,95,78,0.1); }
    .btn-consultar { background: var(--verde); color: white; border: none; padding: 12px 20px; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; width: 100%; transition: 0.2s; }
    .btn-consultar:hover { background: var(--verde-osc); }
    
    #resultado { margin-top: 25px; display: none; padding: 20px; border-radius: 8px; border: 1px solid var(--linea); background: var(--papel); }
    .badge-estado { display: inline-block; padding: 6px 12px; border-radius: 20px; font-weight: bold; color: white; font-size: 0.85rem; margin-bottom: 10px; }
    .estado-PENDIENTE { background: #f39c12; }
    .estado-EN_REVISION { background: #3498db; }
    .estado-APROBADA { background: #2ecc71; }
    .estado-RECHAZADA { background: #e74c3c; }
    
    .volver { display: block; text-align: center; margin-top: 20px; color: var(--tinta-suave); font-size: 0.9rem; text-decoration: none; }
    .volver:hover { text-decoration: underline; color: var(--verde); }
    
    #loading { display: none; text-align: center; color: var(--tinta-suave); margin-top: 15px; font-style: italic; }
  </style>
</head>
<body>

<header class="app">
  <div class="marca">
    <div class="sello"><img id="logo-img" src="" alt="Escudo ISTAE"></div>
    <div>
      <h1>Portal del Estudiante</h1>
      <p>Instituto Superior Tecnológico "Alberto Enríquez"</p>
    </div>
  </div>
</header>

<main>
  <div class="consulta-container">
    <h2>Consultar Estado del Trámite</h2>
    <p style="color:var(--tinta-suave); font-size:0.95rem; margin-bottom:25px;">Ingresa tu número de cédula para ver el historial y estado de todas tus solicitudes.</p>
    
    <form id="formConsulta">
      <div class="form-group">
        <label for="cedula">Número de Cédula</label>
        <input type="text" id="cedula" placeholder="10 dígitos" required autocomplete="off">
      </div>
      <button type="submit" class="btn-consultar">Consultar Estado</button>
    </form>
    
    <div id="loading">Consultando en la base de datos...</div>
    
    <div id="resultado">
      <!-- Aquí se inyectará la info -->
    </div>
    
    <a href="index.html" class="volver">← Volver al Asistente de Solicitudes</a>
  </div>
</main>

<script src="js/config.js"></script>
<script src="js/consulta.js"></script>
</body>
</html>
